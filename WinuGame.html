<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>氷上のウィーヌの大冒険</title>
    <style>
        body {
            text-align: center;
            font-family: sans-serif;
            background-color: #e0f7fa;
            margin: 0;
            padding: 10px;
            touch-action: none;
        }
        h1 { color: #006064; font-size: 24px; margin: 10px 0; }
        #info {
            font-size: 18px;
            margin-bottom: 10px;
            color: #004d40;
        }
        #gameCanvas {
            background-color: #e1f5fe;
            border: 4px solid #4fc3f7;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            max-width: 100%;
            height: auto;
        }
        #startBtn {
            font-size: 18px;
            padding: 12px 24px;
            background-color: #0288d1;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>❄️ 氷上のウィーヌの大冒険 ❄️</h1>
    <div id="info">スコア: <span id="score">0</span> | 残り時間: <span id="timer">20</span>秒</div>
    <canvas id="gameCanvas" width="360" height="360"></canvas>
    <br>
    <button id="startBtn" onclick="startGame()">ゲームスタート</button>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");
        const timerDisplay = document.getElementById("timer");

        // ゲームデータ
        let player = { x: 180, y: 180, vx: 0, vy: 0, size: 20, speed: 0.4, friction: 0.97 };
        let coin = { x: 0, y: 0, size: 12 };
        let score = 0;
        let timeLeft = 20;
        let isPlaying = false;
        let gameInterval, timerInterval;

        // キーボード入力の状態を記録するオブジェクト
        let keys = {};

        // スマホ・マウス用の変数
        let targetX = null;
        let targetY = null;
        let isTouching = false;

        // キーボードイベントの登録（WASDと矢印に対応）
        window.addEventListener("keydown", (e) => {
            // 小文字でも大文字でも動くように「toLowerCase()」を通します
            keys[e.key.toLowerCase()] = true;
        });
        window.addEventListener("keyup", (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // タッチ＆マウスイベントの登録
        canvas.addEventListener("touchstart", (e) => { handleStart(e.touches[0]); e.preventDefault(); }, {passive: false});
        canvas.addEventListener("touchmove", (e) => { handleMove(e.touches[0]); e.preventDefault(); }, {passive: false});
        canvas.addEventListener("touchend", () => { isTouching = false; });

        canvas.addEventListener("mousedown", (e) => { handleStart(e); isTouching = true; });
        canvas.addEventListener("mousemove", (e) => { if(isTouching) handleMove(e); });
        canvas.addEventListener("mouseup", () => { isTouching = false; });

        function handleStart(e) {
            const rect = canvas.getBoundingClientRect();
            targetX = (e.clientX - rect.left) * (canvas.width / rect.width);
            targetY = (e.clientY - rect.top) * (canvas.height / rect.height);
            isTouching = true;
        }

        function handleMove(e) {
            const rect = canvas.getBoundingClientRect();
            targetX = (e.clientX - rect.left) * (canvas.width / rect.width);
            targetY = (e.clientY - rect.top) * (canvas.height / rect.height);
        }

        function spawnCoin() {
            coin.x = Math.random() * (canvas.width - coin.size * 2) + coin.size;
            coin.y = Math.random() * (canvas.height - coin.size * 2) + coin.size;
        }

        function startGame() {
            if (isPlaying) return;
            isPlaying = true;
            score = 0;
            timeLeft = 20;
            player.x = 180; player.y = 180;
            player.vx = 0;  player.vy = 0;
            isTouching = false;
            keys = {}; // キー入力をリセット
            scoreDisplay.innerText = score;
            timerDisplay.innerText = timeLeft;
            spawnCoin();

            gameInterval = setInterval(update, 1000 / 60);
            timerInterval = setInterval(countdown, 1000);
        }

        function countdown() {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            ctx.fillStyle = "rgba(0, 96, 100, 0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "bold 22px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("タイムアップ！", canvas.width/2, 160);
            ctx.fillText(`ウィーヌのスコア: ${score}点`, canvas.width/2, 210);
        }

        function update() {
            // 【変更点】キーボード操作（WASD または 矢印キーでじわじわ加速）
            if (keys["w"] || keys["arrowup"]) { player.vy -= player.speed; }
            if (keys["s"] || keys["arrowdown"]) { player.vy += player.speed; }
            if (keys["a"] || keys["arrowleft"]) { player.vx -= player.speed; }
            if (keys["d"] || keys["arrowright"]) { player.vx += player.speed; }

            // スマホのタップ操作（タップ中のみ加速）
            if (isTouching && targetX !== null && targetY !== null) {
                let dx = targetX - player.x;
                let dy = targetY - player.y;
                let dist = Math.hypot(dx, dy);
                if (dist > 5) {
                    player.vx += (dx / dist) * player.speed;
                    player.vy += (dy / dist) * player.speed;
                }
            }

            // 摩擦（滑る演出）
            player.vx *= player.friction;
            player.vy *= player.friction;

            // 移動反映
            player.x += player.vx;
            player.y += player.vy;

            // 壁での跳ね返り
            if (player.x < player.size) { player.x = player.size; player.vx *= -0.6; }
            if (player.x > canvas.width - player.size) { player.x = canvas.width - player.size; player.vx *= -0.6; }
            if (player.y < player.size) { player.y = player.size; player.vy *= -0.6; }
            if (player.y > canvas.height - player.size) { player.y = canvas.height - player.size; player.vy *= -0.6; }

            // 当たり判定
            let coinDist = Math.hypot(player.x - coin.x, player.y - coin.y);
            if (coinDist < player.size + coin.size) {
                score++;
                scoreDisplay.innerText = score;
                spawnCoin();
            }

            // 描画
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ひび割れ模様
            ctx.strokeStyle = "rgba(255,255,255,0.4)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(50, 80); ctx.lineTo(120, 140); ctx.lineTo(100, 200);
            ctx.moveTo(300, 250); ctx.lineTo(250, 280);
            ctx.stroke();

            // コイン
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, coin.size, 0, Math.PI * 2);
            ctx.fillStyle = "#ff9100";
            ctx.fill();
            ctx.closePath();

            // ウィーヌ
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fillStyle = "#00bcd4";
            ctx.fill();
            ctx.closePath();

            // 名前
            ctx.fillStyle = "white";
            ctx.font = "bold 11px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("ウィーヌ", player.x, player.y + 4);
        }
    </script>
</body>
</html>
