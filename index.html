<!DOCTYPE HTML> 
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ウィーヌの公式サイト</title>
    <link rel="icon" href="otameshi.png">
    <style>
        /* 全体の設定 */
        html {
            scroll-behavior: smooth; /* メニューを押したときにスルスル移動する設定 */
        }
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
        }

        /* ヘッダーの設定（画面の上に固定） */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background-color: #333;
            position: fixed;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* ヘッダーが固定されている分、コンテンツが隠れないように余白を作る */
        main {
            padding-top: 80px; 
        }

        /* 各ページ（セクション）の設定 */
        section {
            padding: 80px 20px;
            min-height: 60vh;
            max-width: 900px;
            margin: 0 auto;
        }

        h2 {
            color: #333;
            border-bottom: 3px solid gold;
            padding-bottom: 10px;
            display: inline-block;
        }

        /* プロフィールカードのデザイン */
        .profile-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            line-height: 1.8;
            font-size: 18px;
        }

        /* ゲーム作品のグリッド（ドライブ風） */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding-top: 20px;
        }

        /* ゲームカードのデザイン（角丸・影付き） */
        .game-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        /* マウスを乗せたときのアニメーション */
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .game-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background-color: #ddd; /* 画像がない時の仮の色 */
        }

        .game-title {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- ヘッダー -->
    <header>
        <!-- 左側：タイトル -->
        <div style="font-size: 40px; color: gold; padding: 10px 20px; font-weight: bold;">ウィーヌ</div>
        <!-- 右側：メニューボタン -->
        <nav style="padding-right: 20px;">
            <a href="#home" style="color: white; text-decoration: none; margin-left: 20px; font-size: 20px;">ホーム</a>
            <a href="#profile" style="color: white; text-decoration: none; margin-left: 20px; font-size: 20px;">プロフィール</a>
            <a href="#games" style="color: white; text-decoration: none; margin-left: 20px; font-size: 20px;">ゲーム作品</a>
        </nav>
    </header>

    <main>
        <!-- ホーム画面エリア -->
        <section id="home" style="text-align: center;">
            <h1 style="font-size: 40px; margin-top: 50px;">ようこそ！ウィーヌの公式サイトへ</h1>
            <p style="font-size: 20px;">
                ここでは、私のプロフィールや過去に作ったゲーム作品を公開しています。<br>
                上のメニューをクリックすると、それぞれの場所に移動するよ！
            </p>
        </section>

        <!-- プロフィール画面エリア -->
        <section id="profile">
            <h2>プロフィール</h2>
            <div class="profile-card">
                <p><strong>名前：</strong> ウィーヌ</p>
                <p><strong>趣味・特技：</strong> ゲーム制作など</p>
                <p><strong>ひとこと：</strong> これから面白いゲームをどんどん作ってここに追加していきます！ドライブみたいにゲームが並んでいく予定です。</p>
            </div>
        </section>

        <!-- 過去のゲーム作品エリア -->
        <section id="games">
            <h2>🕹️ 過去のゲーム作品</h2>
            <p>今まで作ったゲームです。四角いカードをクリックするとゲーム画面に飛んで遊べるよ！</p>
            
            <div class="grid-container">
                <!-- 1つ目のゲーム作品（WinuGame） -->
                <a href="https://winu-u0304.github.io/WinuGame/" target="_blank" class="game-card">
                    <!-- 画像が用意できたら src="..." の中を書き換えてください -->
                    <img src="https://via.placeholder.com/400x300?text=WinuGame" alt="WinuGame" class="game-image">
                    <div class="game-title">WinuGame</div>
                </a>

                <!-- ★今後ゲームを増やす時は、上の <a href="..."> 〜 </a> をコピーして、この下に貼り付けるだけ！★ -->
                
            </div>
        </section>
    </main>

</body>
</html>
